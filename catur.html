<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Royal Chess 3D</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle,#475569,#020617);

font-family:Arial;

color:white;

}


.container{

background:#ffffff12;

padding:30px;

border-radius:30px;

box-shadow:
0 0 50px black;

backdrop-filter:blur(15px);

text-align:center;

}



h1{

color:#ffd700;

text-shadow:
0 0 25px gold;

}



input{

padding:13px;

margin:8px;

border-radius:15px;

border:0;

width:230px;

}



button{

padding:13px 30px;

border:0;

border-radius:20px;

background:#ffd700;

font-weight:bold;

cursor:pointer;

}



#game{

display:none;

}



.score{

display:flex;

gap:20px;

justify-content:center;

margin:20px;

}



.card{

background:#ffffff20;

padding:15px;

border-radius:20px;

}



.number{

font-size:30px;

color:#ffd700;

}



#board{

display:grid;

grid-template-columns:repeat(8,65px);

border:8px solid #c58b25;

transform:

perspective(900px)
rotateX(12deg);

box-shadow:

0 40px 60px black;

}



.cell{

width:65px;

height:65px;

display:flex;

justify-content:center;

align-items:center;

position:relative;

cursor:pointer;

}



.white{

background:

linear-gradient(135deg,#f8e7bf,#c99a55);

}



.black{

background:

linear-gradient(135deg,#754c24,#301805);

}



.selected{

background:#16a34a!important;

}



.dot:after{

content:"";

width:18px;

height:18px;

border-radius:50%;

background:#00ff88;

position:absolute;

box-shadow:

0 0 20px #00ff88;

}



.enemy:after{

content:"";

position:absolute;

width:50px;

height:50px;

border-radius:50%;

border:4px solid red;

}



.piece{

font-size:52px;

filter:

drop-shadow(0 12px 8px black);

text-shadow:

0 4px 0 #777;

transition:.3s;

}



.piece:hover{

transform:

translateY(-10px)
scale(1.15);

}



@media(max-width:600px){

#board{

grid-template-columns:repeat(8,11vw);

}


.cell{

width:11vw;

height:11vw;

}


.piece{

font-size:7vw;

}

}


</style>

</head>


<body>


<div class="container" id="login">


<h1>♔ Royal Chess</h1>


<input id="namaPutih" placeholder="Nama Putih">

<br>

<input id="namaHitam" placeholder="Nama Hitam">

<br><br>


<button onclick="mulai()">

Mulai Game

</button>


</div>




<div class="container" id="game">


<h1>♔ Royal Chess</h1>


<div class="score">


<div class="card">

♙ <span id="putih">Putih</span>

<br>

Score:

<b id="sp">0</b>

<br>

Dimakan:

<b id="mp">0</b>

</div>



<div class="card">

♟ <span id="hitam">Hitam</span>

<br>

Score:

<b id="sh">0</b>

<br>

Dimakan:

<b id="mh">0</b>

</div>


</div>


<h3 id="status"></h3>


<div id="board"></div>


<br>


<button onclick="resetGame()">

Reset

</button>


</div>




<script>


let awal=[

["♜","♞","♝","♛","♚","♝","♞","♜"],

["♟","♟","♟","♟","♟","♟","♟","♟"],

["","","","","","","",""],

["","","","","","","",""],

["","","","","","","",""],

["","","","","","","",""],

["♙","♙","♙","♙","♙","♙","♙","♙"],

["♖","♘","♗","♕","♔","♗","♘","♖"]

];


let papan=JSON.parse(JSON.stringify(awal));


let giliran="putih";

let pilih=null;

let langkah=[];


let sp=0,sh=0,mp=0,mh=0;



function mulai(){

putih.innerHTML=
namaPutih.value||"Putih";

hitam.innerHTML=
namaHitam.value||"Hitam";


login.style.display="none";

game.style.display="block";


gambar();

}




function gambar(){


board.innerHTML="";


status.innerHTML=

"Giliran : "

+

(giliran=="putih"?putih.innerHTML:hitam.innerHTML);



document.getElementById("sp").innerHTML=sp;

document.getElementById("sh").innerHTML=sh;

document.getElementById("mp").innerHTML=mp;

document.getElementById("mh").innerHTML=mh;



for(let y=0;y<8;y++){

for(let x=0;x<8;x++){


let c=document.createElement("div");


c.className=

"cell "

+

((x+y)%2?"black":"white");



if(pilih&&pilih.x==x&&pilih.y==y)

c.classList.add("selected");



if(langkah.some(a=>a.x==x&&a.y==y)){


if(papan[y][x]=="")
c.classList.add("dot");

else
c.classList.add("enemy");


}



if(papan[y][x]!="")

c.innerHTML=

"<span class='piece'>"

+papan[y][x]+

"</span>";



c.onclick=()=>klik(x,y);


board.appendChild(c);


}

}


}



function klik(x,y){


let bidak=papan[y][x];


if(!pilih){


if(bidak=="")return;


if(giliran=="putih"&&
!"♙♖♘♗♕♔".includes(bidak))
return;


if(giliran=="hitam"&&
!"♟♜♞♝♛♚".includes(bidak))
return;



pilih={x,y};


buatLangkah(x,y);


gambar();


}

else{


if(langkah.some(a=>a.x==x&&a.y==y)){


if(papan[y][x]!=""){

if(giliran=="putih"){

sp++;

mp++;

}else{

sh++;

mh++;

}

}



papan[y][x]=
papan[pilih.y][pilih.x];


papan[pilih.y][pilih.x]="";


giliran=

giliran=="putih"?"hitam":"putih";


}


pilih=null;

langkah=[];


gambar();


}

}



function buatLangkah(x,y){

langkah=[];


let arah=[

[1,0],

[-1,0],

[0,1],

[0,-1]

];


arah.forEach(a=>{


let nx=x+a[0];

let ny=y+a[1];


if(nx>=0&&nx<8&&ny>=0&&ny<8){


let target=papan[ny][nx];


if(target=="")
langkah.push({x:nx,y:ny});


else if(giliran=="putih"&&
"♟♜♞♝♛♚".includes(target))

langkah.push({x:nx,y:ny});


else if(giliran=="hitam"&&
"♙♖♘♗♕♔".includes(target))

langkah.push({x:nx,y:ny});


}


});


}



function resetGame(){

papan=JSON.parse(JSON.stringify(awal));

giliran="putih";

pilih=null;

langkah=[];

sp=sh=mp=mh=0;

gambar();

}


</script>


</body>
</html>
